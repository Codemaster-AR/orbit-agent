<!DOCTYPE html>
<html>
<head>
    <title>Orbit Agent Dashboard</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; background: #121214; color: #e1e1e6; }
        #sidebar { width: 320px; padding: 25px; border-right: 1px solid #29292e; display: flex; flex-direction: column; gap: 20px; background: #202024; }
        #browser-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #121214; color: #7c7c8a; font-size: 0.95rem; text-align: center; padding: 40px; }
        h3 { margin: 0; color: #04d361; font-size: 1.4rem; letter-spacing: -0.5px; }
        textarea { width: 100%; height: 120px; background: #121214; color: #e1e1e6; border: 1px solid #29292e; border-radius: 6px; padding: 12px; resize: none; font-size: 0.9rem; box-sizing: border-box; }
        textarea:focus { border-color: #04d361; outline: none; }
        button { background: #04d361; color: #000; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.95rem; transition: background 0.2s; }
        button:hover { background: #00b34d; }
        #status { font-size: 0.85rem; color: #a8a8b3; margin-top: 5px; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Orbit Agent</h3>
        <textarea id="prompt" placeholder="Enter instructions (e.g., search for codemaster-ar on github via bing)"></textarea>
        <button id="run-btn">Launch Agent</button>
        <div id="status">Status: Idle</div>
    </div>
    <div id="browser-view">
        <p>Your automated Chromium browser window will spin up right next to this app window once launched.</p>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const runBtn = document.getElementById('run-btn');
        const promptInput = document.getElementById('prompt');
        const statusDiv = document.getElementById('status');

        runBtn.addEventListener('click', () => {
            const text = promptInput.value.trim();
            if (text) ipcRenderer.send('run-agent', text);
        });

        ipcRenderer.on('status-update', (event, message) => {
            statusDiv.innerText = `Status: ${message}`;
        });
    </script>
</body>
</html>
