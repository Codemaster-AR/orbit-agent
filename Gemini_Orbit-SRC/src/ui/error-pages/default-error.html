<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>An Error Occurred</title>
  <style>
    body { font-family: sans-serif; background-color: #050505; color: #CCCCCC; text-align: center; padding: 50px; }
    h1 { color: #CCCCCC; }
    button { padding: 10px 20px; background-color: #4B90FF; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    button:hover { background-color: #3A70CC; }
  </style>
</head>
<body>
  <h1>An Error Occurred</h1>
  <p>An unexpected error prevented this page from loading.</p>
  <p>Please try again later or navigate to a different page.</p>
  <button onclick="window.history.back()">Go Back</button>
</body>
</html>
