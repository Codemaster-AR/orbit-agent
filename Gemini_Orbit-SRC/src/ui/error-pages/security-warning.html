<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Security Warning</title>
  <style>
    body { font-family: sans-serif; background-color: #050505; color: #FF6666; text-align: center; padding: 50px; }
    h1 { color: #FF6666; }
    button { padding: 10px 20px; background-color: #4B90FF; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    button:hover { background-color: #3A70CC; }
  </style>
</head>
<body>
  <h1>Security Warning</h1>
  <p>This site has been blocked due to security concerns.</p>
  <p>For more details, please consult your system administrator or security policy.</p>
  <p>You can try to navigate to another page.</p>
  <button onclick="window.history.back()">Go Back</button>
</body>
</html>
